<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — page not found · MD. Yusuf Ahmed</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a192f">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <style>
    :root{
      --navy-950:#0a192f;--navy-900:#112240;--navy-700:#233554;
      --slate-400:#8892b0;--slate-100:#ccd6f6;--white:#e6f1ff;
      --mint:#64ffda;--genda:#efa63f;
      --ease-out:cubic-bezier(.22,1,.36,1);
    }
    @font-face{font-family:'Bricolage Grotesque';src:url('/assets/fonts/BricolageGrotesque-var.woff2') format('woff2');font-weight:200 800;font-display:swap;}
    @font-face{font-family:'IBM Plex Sans';src:url('/assets/fonts/IBMPlexSans-var.woff2') format('woff2');font-weight:300 700;font-display:swap;}
    *{box-sizing:border-box;margin:0}
    html{color-scheme:dark}
    body{
      min-height:100svh;display:grid;place-items:center;
      background:var(--navy-950);color:var(--slate-100);
      font:400 1.0625rem/1.65 'IBM Plex Sans',Arial,sans-serif;
      padding:2rem;text-align:center;
      background-image:radial-gradient(30rem 22rem at 70% 8%,var(--navy-900) 0%,transparent 70%);
    }
    ::selection{background:var(--genda);color:var(--navy-950)}
    :focus-visible{outline:2px solid var(--mint);outline-offset:3px;border-radius:2px}
    .code{
      font-family:'Bricolage Grotesque',Arial,sans-serif;font-weight:760;
      font-size:clamp(5rem,22vw,11rem);line-height:1;color:var(--white);letter-spacing:-.02em;
    }
    .code span{color:var(--genda)}
    .path{font-family:ui-monospace,Consolas,monospace;font-size:.8125rem;color:var(--slate-400);letter-spacing:.08em;margin-top:.75rem}
    .path b{color:var(--mint);font-weight:400}
    h1{font-size:1.25rem;font-weight:500;color:var(--slate-100);margin-top:1.5rem}
    p{color:var(--slate-400);max-width:34ch;margin:0.5rem auto 0}
    .btn{
      display:inline-block;margin-top:2.25rem;background:var(--mint);color:var(--navy-950);
      text-decoration:none;font-weight:600;font-size:.9375rem;padding:.8em 1.5em;border-radius:12px;
      transition:transform 140ms var(--ease-out);
    }
    .btn:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
  <main>
    <p class="code" aria-hidden="true">4<span>0</span>4</p>
    <p class="path"><b>~/</b>this-page → not found</p>
    <h1>This page wandered off the map.</h1>
    <p>Even the best journeys take a wrong turn. The rest of the story is still where it should be.</p>
    <a class="btn" href="/">Back to the story</a>
  </main>
</body>
</html>
